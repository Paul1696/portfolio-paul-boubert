version: 1
frontend:
  phases:
    # On peut ajouter une phase d'installation si on utilise des outils de compression
    # Mais pour du HTML/JS pur, on peut passer directement aux artefacts.
    build:
      commands:
        - echo "Prêt pour le déploiement"
  artifacts:
    baseDirectory: /
    files:
      - 'index.html'
      - 'style.css'
      - 'script.js'
      - 'profile_paul.jpg'
      - 'assets/**/*'
      - 'projects/**/*'
      - 'CNAME'
      - '.nojekyll'
  cache:
    paths: []
customHeaders:
  - pattern: '**/*.{png,jpg,jpeg,svg,webp,css,js}'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'SAMEORIGIN'
      - key: 'X-XSS-Protection'
        value: '1; mode=block'
